name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE: dannyswat/jiceot

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture tag name
        id: tag
        run: echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag points to the default branch head
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          DEFAULT_BRANCH_SHA=$(git rev-parse "origin/${DEFAULT_BRANCH}")

          if [[ "${GITHUB_SHA}" != "${DEFAULT_BRANCH_SHA}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, but origin/${DEFAULT_BRANCH} is ${DEFAULT_BRANCH_SHA}."
            exit 1
          fi

  client:
    name: Client build and test
    runs-on: ubuntu-latest
    needs: verify-tag
    defaults:
      run:
        working-directory: client
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Run client tests
        run: npm run test -- --passWithNoTests

      - name: Build client
        run: npm run build

  server:
    name: Server build and test
    runs-on: ubuntu-latest
    needs: verify-tag
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run server tests
        run: go test ./...

      - name: Build server
        run: go build -o /tmp/jiceot-server ./cmd/api/main.go

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - client
      - server
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.verify-tag.outputs.release_tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.verify-tag.outputs.release_tag }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - docker
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.release_tag }}
          generate_release_notes: true